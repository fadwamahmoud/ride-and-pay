version: '3'

services:
  mongodb-payment:
    image: mongo:7
    hostname: mongodb-payment
    command: mongod --replSet rs-payment --bind_ip_all
    ports:
      - "27018:27017"
    volumes:
      - db-payment:/data/db
    networks:
      - web
  mongodb-ride:
    image: mongo:7
    hostname: mongodb-ride
    command: mongod --replSet rs-ride --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - db-ride:/data/db
    networks:
      - web
  redis-ride:
    image: "redis:7-alpine"
    command: redis-server --requirepass devpass
    volumes:
      - "./data/redis:/data"
    ports:
      - "6379:6379"
    networks:
      - web
  redis-pay:
    image: "redis:7-alpine"
    command: redis-server --requirepass devpass
    volumes:
      - "./data/redis:/data"
    ports:
      - "6380:6379"
    networks:
      - web
  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"
    networks:
      - web
  kafka:
    image: wurstmeister/kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_ADVERTISED_HOST_NAME: 127.0.0.1
      KAFKA_CREATE_TOPICS: "test:1:1"
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ZOOKEEPER_TIMEOUT_MS: 36000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - web
networks:
  web:
    driver: bridge
volumes:
  db-ride:
  db-payment:
